<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogIn Page</title>

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind and daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- link css -->
    <link rel="stylesheet" href="./tailwind.css">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body class="container mx-auto ">
    <div class=" flex justify-center items-center py-20 ">
        <div class=" p-8 bg-base-100 shadow-xl border border-gray-200 rounded-xl space-y-5">
            <div class=" text-center space-y-8">
                <img src="./assets/github-logo.png" alt="" class="mx-auto">
                <div>
                    <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
                    <p class="text-[#64748B]">Sign in to manage your issues</p>
                </div>
            </div>
            <div>
                <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
                    <legend class="fieldset-legend">Login</legend>
                
                    <label class="label">User Name</label>
                    <input id="user-input" type="text" class="input" placeholder="Username" />
                    <p class="text-purple-400">Default: admin</p>
                
                    <label class="label">Password</label>
                    <input id="user-password" type="password" class="input" placeholder="Password" />
                    <p class="text-purple-400">Default: admin123</p>
                
                    <button onclick="mainPageLoad()" class="btn btn-primary mt-4">Login</button>
                </fieldset>
            </div>
            <div class="flex justify-center items-center gap-1">
                <span class="text-[4px] text-gray-400">----------------------------</span>
                <p>OR</p>
                <span class="text-[4px] text-gray-400">----------------------------</span>
            </div>
            <div>
                <p class="text-sm text-[#64748B] text-center py-2">Demo Credentials:</p>
                <div class="bg-base-300 p-4 text-center rounded-xl">
                    <h2>Username: admin</h2>
                    <h2>Password: admin123</h2>
                </div>
            </div>
        </div>
    </div>

    <script>
        const mainPageLoad = () => {
            const userInput = document.getElementById("user-input").value
            const userPassword = document.getElementById("user-password").value
            // console.log(userInput, userPassword)
            if(userInput == 'admin' && userPassword == 'admin123'){
                window.location.href = "./dashboard.html"; 
            }
            else{
                return;
            }   
        }
    </script>
</body>

</html>
